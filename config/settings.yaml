# Moolah IQ V3.8.2 — Pipeline Settings

pipeline:
  version: "3.8.2"
  max_corrections: 3          # max QC retry loops before hard-fail
  langsmith_tracing: true
  log_level: INFO

# ── Service URLs ─────────────────────────────────────────────────────

services:
  ollama:
    url: "http://localhost:11434"
    model: "llama4:16x17b"
    timeout_seconds: 120

  comfyui:
    url: "http://localhost:8000"
    ws_url: "ws://localhost:8000/ws"
    timeout_seconds: 300

  postiz:
    url: "http://localhost:4200"
    timeout_seconds: 30

  davinci_resolve:
    script_api: true           # use DaVinci Resolve scripting API
    project_name: "MoolahIQ_Pipeline"

# ── Content Thresholds ───────────────────────────────────────────────

thresholds:
  decision:
    go_score: 65               # composite score threshold for GO verdict
    alignment_weight: 0.35
    demand_weight: 0.40
    gap_weight: 0.25

  script:
    min_words: 1200
    max_words: 1900
    target_wpm: 155            # words per minute for TTS pacing

  blog:
    min_words: 1200
    max_words: 1800
    min_internal_links: 3
    min_flesch_score: 60
    keyword_density_min: 0.015
    keyword_density_max: 0.025

  newsletter:
    max_words: 500
    max_subject_length: 50
    max_preview_length: 90

  video:
    resolution: "1920x1080"
    frame_rate: 60
    codec: "h265"
    max_file_size_gb: 5
    voice_peak_db: -3
    music_bed_db: -15

  seo:
    max_title_length: 60
    min_tags: 15
    max_tags: 25
    hashtag_count: 3
    max_meta_description: 155

# ── Brand ────────────────────────────────────────────────────────────

brand:
  name: "Moolah IQ"
  tagline: "Smart Money Moves"
  pillars:
    - EARN
    - SAVE
    - SPEND
    - INVEST
    - PROTECT
    - BORROW
    - LEGACY
    - MILESTONES
  colors:
    primary: "#1a1f3d"         # navy
    accent: "#2d8a4e"          # green
    gold: "#c9a84c"            # gold
  voice_profile: "moolah-iq-v1"  # Qwen3-TTS voice ID

# ── Publishing Schedule ──────────────────────────────────────────────

publishing:
  youtube_optimal_slots:       # UTC times
    - "14:00"                  # 10am ET
    - "18:00"                  # 2pm ET
  newsletter_delay_minutes: 60 # after YouTube publish
  social_stagger_minutes: 15   # between platform posts
